# ============================================================
# docker-compose.yml — cuga-apps full stack
#
# Quick start:
#   1. Copy apps/.env.example to apps/.env and fill in your keys
#   2. Build:   docker compose build
#   3. Start:   docker compose up
#
# Umbrella UI:  http://localhost:3000
# Phoenix:      http://localhost:6006
# ============================================================

services:

  # ── Umbrella UI (React / Vite → nginx) ──────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped

  # ── All demo apps in one container ──────────────────────────
  apps:
    build:
      context: .
      dockerfile: Dockerfile.apps
    restart: unless-stopped
    mem_limit: 32g
    env_file:
      - ./apps/.env
    ports:
      - "18793:18793"   # newsletter
      - "18794:18794"   # drop_summarizer
      - "18798:18798"   # web_researcher
      - "18799:18799"   # voice_journal
      - "18800:18800"   # smart_todo
      - "8767:8767"     # server_monitor
      - "18801:18801"   # stock_alert
      - "8766:8766"     # video_qa
      - "8090:8090"     # travel_planner
      - "18802:18802"   # deck_forge
      - "18803:18803"   # youtube_research
      - "18804:18804"   # arch_diagram
      - "18805:18805"   # hiking_research
      - "18806:18806"   # movie_recommender
      - "8071:8071"     # webpage_summarizer
      - "18807:18807"   # code_reviewer
      - "18808:18808"   # paper_scout
      - "18809:18809"   # wiki_dive
      - "18810:18810"   # box_qa
      - "18811:18811"   # api_doc_gen
      - "18812:18812"   # ibm_cloud_advisor
      - "18813:18813"   # ibm_docs_qa
      - "18814:18814"   # ibm_whats_new
    environment:
      # LLM provider
      - LLM_PROVIDER
      - LLM_MODEL
      # Anthropic
      - ANTHROPIC_API_KEY
      # RITS
      - RITS_API_KEY
      - RITS_BASE_URL
      # watsonx
      - WATSONX_APIKEY
      - WATSONX_PROJECT_ID
      - WATSONX_SPACE_ID
      - WATSONX_URL
      # OpenAI
      - OPENAI_API_KEY
      # Ollama
      - OLLAMA_BASE_URL
      # LiteLLM
      - LITELLM_API_KEY
      - LITELLM_BASE_URL
      # Web search / data APIs
      - TAVILY_API_KEY
      - ALPHA_VANTAGE_API_KEY
      - OPENTRIPMAP_API_KEY
      # Email / SMTP
      - SMTP_HOST
      - SMTP_USERNAME
      - SMTP_PASSWORD
      - ALERT_TO
      - DIGEST_TO
      - RESEARCH_TO
      # Observability
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://phoenix:6006
    volumes:
      - ./apps/drop_summarizer/inbox:/app/apps/drop_summarizer/inbox
      - ./apps/drop_summarizer/data:/app/apps/drop_summarizer/data
      - video_qa_cache:/app/apps/video_qa/.cache
      - ./apps/voice_journal/storage:/app/apps/voice_journal/storage
      - ./apps/smart_todo/storage:/app/apps/smart_todo/storage
      - ./apps/deck_forge/outputs:/app/apps/deck_forge/outputs
      - ./apps/video_qa/videos:/audio:ro
      - ./apps/deck_forge/data:/app/apps/deck_forge/data
    depends_on:
      - phoenix

  # ── Observability (Arize Phoenix) ───────────────────────────
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006"   # Phoenix UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    restart: unless-stopped

# ── Named volumes ────────────────────────────────────────────
volumes:
  video_qa_cache:
